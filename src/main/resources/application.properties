spring.application.name=prehire2

# -----------------------------------------------
# DB Config — override in application-local.properties
# Copy application-local.properties.example and fill your values
# -----------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/prehire}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Schema — run schema.sql on startup
spring.sql.init.mode=never