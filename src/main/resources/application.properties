
spring.application.name=prehire2

spring.profiles.active=local
# -----------------------------------------------
# DB Config — override in application-local.properties
# Copy application-local.properties.example and fill your values
# -----------------------------------------------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/prehire}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway — run versioned migrations on startup
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Schema init disabled; Flyway owns DDL execution
spring.sql.init.mode=never
